<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Are you 21+?</title>
  <style>
    /* ... (păstrez stilul tău) ... */
    :root {
      --bg: #08090c; --card: #0e0e14; --border: #1e1e2a; --accent: #7c6dff; --text: #ffffff; --mid: #888;
      --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .page { width: 100%; max-width: 420px; padding: 24px; text-align: center; }
    .accent { color: var(--accent); }
    h1 { font-size: 3rem; font-weight: 900; margin-bottom: 10px; }
    .btn-yes { display: block; background: var(--accent); color: #fff; padding: 16px; border-radius: 13px; text-decoration: none; font-weight: 700; margin-bottom: 10px; box-shadow: 0 0 20px rgba(124,109,255,0.3); }
    .btn-no { display: block; color: #52526a; text-decoration: none; font-size: 0.9rem; border: 1px solid var(--border); padding: 12px; border-radius: 13px; }
  </style>
</head>
<body>
<div class="page">
  <h1>ARE YOU <span class="accent">21+</span>?</h1>
  <p style="color:#888; margin-bottom:30px;">You must be at least 21 years old to unlock this offer.</p>

  <!-- LINK REPARAT CĂTRE INDEX.HTML -->
  <a href="index.html" class="btn-yes" id="btn-yes">Yes, I am 21 or older →</a>
  
  <!-- LINK CĂTRE BLOCKED.HTML -->
  <a href="blocked.html" class="btn-no" id="btn-no">No, I am under 21</a>
</div>

<script>
// Menținem parametrii URL (dacă ai reclame)
(function(){
  var qs = window.location.search;
  if (qs) {
    document.getElementById('btn-yes').href = 'index.html' + qs;
    document.getElementById('btn-no').href = 'blocked.html' + qs;
  }
})();
</script>
</body>
</html>
